<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Business Card</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="card-scene">
  <div class="card">
    <div class="card-glare"></div>
    <div class="card-content">
      <div class="card-header">
        <div class="card-header-text">
          <div class="card-name">Adam Rohdin</div>
          <div class="card-title">Software Engineer @ OpenSpace</div>
          <div class="card-company">Visualiseringscenter C</div>
          <div class="card-contact">
            <div class="card-field">
              <span class="field-label">Email</span>
              <a href="mailto:adam.rohdin@visualiseringscenter.se">adam.rohdin@visualiseringscenter.se</a>
            </div>
            <div class="card-field">
              <span class="field-label">Tel</span>
              <span class="field-value">+46 72 582 17 73</span>
            </div>
          </div>
        </div>
        <img class="card-avatar" src="media/profile.jpg" alt="John Doe">
      </div>
      <div class="card-divider"></div>
      <div class="card-fields">
        <div class="card-field">
          <a href="https://www.openspaceproject.com">www.openspaceproject.com</a>
        </div>
        <div class="card-field">
          <a href="https://www.visualiseringscenter.se">www.visualiseringscenter.se</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
